<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Recap Studio</title>
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob: https://huggingface.co https://unpkg.com;
      worker-src 'self' blob: https://huggingface.co https://unpkg.com;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' blob: data: https://huggingface.co https://unpkg.com https://api.openai.com https://generativelanguage.googleapis.com https://texttospeech.googleapis.com https://storage.googleapis.com https://www.googleapis.com https://api.deepseek.com wss://*;
      img-src 'self' blob: data: https://huggingface.co;
      media-src 'self' blob:;
      font-src 'self' data:;
    ">
  </head>
  <body>
    <div id="root"></div>
    <div id="runtime-error" style="display:none;position:fixed;inset:0;background:#0d0d0f;color:#e8e8ef;font-family:monospace;padding:40px;z-index:9999;overflow:auto;">
      <h2 style="color:#ef4444;font-size:18px;margin-bottom:12px;">🚨 Application Error</h2>
      <p style="color:#9899a8;font-size:13px;margin-bottom:16px;">Check the console (<strong>F12 → Console</strong>) for details.</p>
      <div style="background:#1c1d23;border:1px solid #ef4444;border-radius:8px;padding:20px;">
        <p class="error-message" style="color:#ef4444;font-size:13px;margin-bottom:8px;font-weight:600;"></p>
        <pre class="error-stack" style="font-size:11px;color:#6a6b7a;line-height:1.6;white-space:pre-wrap;word-break:break-all;"></pre>
      </div>
      <button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#7c3aed;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">Reload</button>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
